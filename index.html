<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Q&As</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>JavaScript Q&As</h1>
      <p>Click a question to see the answer!</p>
    </header>

    <div class="controls">
      <input type="text" id="searchBar" placeholder="Search questions...">
      <button id="openAll">Expand All</button>
      <button id="closeAll">Collapse All</button>
    </div>
    
    <main id="qa-container"></main>
    
    <footer>
      <p>Coded by: Suryanshi Singh</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
